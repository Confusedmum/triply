<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triply — Trip Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --bg:#f5f0e8;--surface:#faf7f2;--s2:#f0ebe0;--s3:#e8e0d0;
  --b:#ddd5c0;--b2:#c8bda8;
  --t:#2c2820;--t2:#6b5f4e;--t3:#9e9080;
  --acc:#8b6914;--acc2:#6b500e;--accbg:rgba(139,105,20,.08);
  --yes:#2d7a52;--maybe:#a06520;--no:#a03020;
  --yesbg:rgba(45,122,82,.10);--maybebg:rgba(160,101,32,.10);--nobg:rgba(160,48,32,.10);
  --shadow:0 2px 12px rgba(0,0,0,.08);--shadow2:0 6px 24px rgba(0,0,0,.13);
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--acc);text-decoration:none}a:hover{text-decoration:underline}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--b);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:21px;color:var(--acc)}
.badge{font-size:10px;font-weight:600;background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:2px 8px;color:var(--t3);margin-left:8px}
.hdr-r{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--rs);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:var(--acc2)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--b)}.btn-g:hover{background:var(--s2);color:var(--t)}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--b);background:var(--surface);flex-shrink:0;position:sticky;top:52px;z-index:90}
.tab{padding:10px 20px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.tab:hover:not(.on){color:var(--t)}

/* ── PANELS ── */
.panel{display:none;flex:1}
.panel.on{display:flex;flex-direction:column}

/* ── LOADING / ERROR ── */
.status-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--t3);font-size:14px;padding:40px}
.status-screen .spinner{width:32px;height:32px;border:3px solid var(--b);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ITINERARY ── */
#itin-panel{overflow:hidden}
.itin-scroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:16px;display:flex;gap:12px;align-items:flex-start;-webkit-overflow-scrolling:touch}
.itin-scroll::-webkit-scrollbar{height:5px}
.itin-scroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

.dcol{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);width:220px;min-width:220px;display:flex;flex-direction:column;max-height:calc(100vh - 120px);flex-shrink:0;box-shadow:var(--shadow)}
.dcol-h{padding:8px 10px 6px;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--s2);border-radius:var(--r) var(--r) 0 0}
.d-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--acc);display:block}
.d-date-lbl{font-size:10px;color:var(--t3);font-weight:500}
.dcol-scroll{flex:1;overflow-y:auto;padding:7px;-webkit-overflow-scrolling:touch}
.dcol-scroll::-webkit-scrollbar{width:3px}
.dcol-scroll::-webkit-scrollbar-thumb{background:var(--b);border-radius:2px}
.dsec{margin-bottom:7px}
.dsec-h{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);padding:3px 5px;border-bottom:1px solid var(--b);margin-bottom:3px;display:flex;align-items:center;gap:3px}
.dsec-note{font-size:11px;color:var(--t2);padding:3px 5px;line-height:1.5;white-space:pre-wrap}

.ic{background:var(--surface);border:1px solid var(--b);border-radius:var(--rs);margin-bottom:4px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;cursor:pointer;transition:border-color .15s}
.ic:hover{border-color:var(--b2)}
.ic[data-s="yes"]{border-left:2px solid var(--yes)}
.ic[data-s="maybe"]{border-left:2px solid var(--maybe)}
.ic[data-s="no"]{border-left:2px solid var(--no)}
.ic-img{width:100%;height:55px;object-fit:cover;display:block;background:var(--s2)}
.ic-ph{width:100%;height:36px;background:var(--s3);display:flex;align-items:center;justify-content:center}
.ic-body{padding:4px 7px 5px}
.ic-nm{font-size:11px;font-weight:600;margin-bottom:1px;color:var(--t)}
.ic-sub{font-size:10px;color:var(--t3);display:flex;gap:5px;align-items:center}

/* Flight cards */
.fc{background:linear-gradient(135deg,#1a2a4a 0%,#1e3a6e 100%);border-radius:var(--rs);margin-bottom:5px;overflow:hidden;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.fc-head{display:flex;align-items:center;justify-content:space-between;padding:6px 9px 4px}
.fc-airline{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.6)}
.fc-num{font-size:11px;font-weight:700;color:#fff}
.fc-status{font-size:9px;padding:1px 6px;border-radius:20px;font-weight:600;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.fc-route{display:flex;align-items:center;gap:5px;padding:3px 9px 7px}
.fc-airport{text-align:center}
.fc-iata{font-size:15px;font-weight:700;color:#fff;line-height:1}
.fc-time{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px}
.fc-city{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px;max-width:55px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-arrow{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.fc-arrow-line{height:1px;width:100%;background:rgba(255,255,255,.25);position:relative}
.fc-arrow-line::after{content:'▶';position:absolute;right:-4px;top:-5px;font-size:8px;color:rgba(255,255,255,.4)}
.fc-duration{font-size:9px;color:rgba(255,255,255,.45);margin-top:1px}

/* ── RESEARCH ── */
#res-panel{overflow:hidden}
.filter-row{display:flex;gap:5px;padding:7px 11px;border-bottom:1px solid var(--b);flex-wrap:wrap;flex-shrink:0;background:var(--surface);align-items:center}
.chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--b);background:transparent;color:var(--t3);font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.chip.on{border-color:var(--acc);color:var(--acc);background:var(--accbg)}
.chip:hover:not(.on){color:var(--t);border-color:var(--b2)}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filter-sep{width:1px;height:16px;background:var(--b2);margin:0 3px}
.res-body{flex:1;overflow-y:auto;padding:11px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;align-content:start;-webkit-overflow-scrolling:touch}

.rc{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s;position:relative;display:flex;flex-direction:column;box-shadow:var(--shadow);height:230px}
.rc:hover{border-color:var(--b2);box-shadow:var(--shadow2);transform:translateY(-2px)}
.rc[data-s="yes"]{border-left:3px solid var(--yes)}
.rc[data-s="maybe"]{border-left:3px solid var(--maybe)}
.rc[data-s="no"]{border-left:3px solid var(--no)}
.rc-img-wrap{width:100%;height:90px;overflow:hidden;flex-shrink:0;position:relative;background:var(--s2)}
.rc-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.rc-ph{width:100%;height:90px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rc-bd{padding:8px 11px 5px;flex:1;display:flex;flex-direction:column;justify-content:space-between;min-height:0}
.rc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.rc-nm{font-size:13px;font-weight:600;flex:1;line-height:1.3;color:var(--t);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-cat{font-size:10px;white-space:nowrap;flex-shrink:0;background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:2px 7px;color:var(--t3);display:flex;align-items:center;gap:4px}
.rc-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rc-cost{font-size:11px;color:var(--acc);font-weight:600}
.rc-st{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.rc-st.yes{background:var(--yesbg);color:var(--yes)}
.rc-st.maybe{background:var(--maybebg);color:var(--maybe)}
.rc-st.no{background:var(--nobg);color:var(--no)}
.rc-ft{display:flex;gap:4px;padding:6px 11px 8px;border-top:1px solid var(--b);flex-shrink:0}

/* ── MAP ── */
#map-panel{overflow:hidden}
.map-search-bar{display:flex;gap:0;padding:8px 10px;border-bottom:1px solid var(--b);background:var(--surface);flex-shrink:0}
.map-search-input{flex:1;background:var(--s2);border:1px solid var(--b);border-right:none;border-radius:var(--rs) 0 0 var(--rs);padding:6px 10px;color:var(--t);font-size:12px;font-family:inherit;outline:none}
.map-search-input:focus{border-color:var(--acc)}
.map-search-btn{background:var(--acc);border:none;border-radius:0 var(--rs) var(--rs) 0;padding:0 10px;cursor:pointer;color:#fff;display:flex;align-items:center}
.map-search-btn:hover{background:var(--acc2)}
#mapSearchResults{position:relative;z-index:500;flex-shrink:0}
.map-search-result{padding:7px 12px;font-size:12px;color:var(--t2);cursor:pointer;border-bottom:1px solid var(--b);background:var(--surface)}
.map-search-result:hover{background:var(--s2);color:var(--t)}
#map{flex:1;min-height:300px}

/* ── CARD DETAIL OVERLAY ── */
.cprev-ov{position:fixed;inset:0;background:rgba(44,40,32,.6);backdrop-filter:blur(4px);z-index:1500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.cprev-ov.open{opacity:1;pointer-events:all}
.cprev-modal{background:var(--surface);border:1px solid var(--b2);border-radius:14px;width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.18);transform:translateY(10px);transition:transform .2s;-webkit-overflow-scrolling:touch}
.cprev-ov.open .cprev-modal{transform:translateY(0)}
.cprev-img{width:100%;max-height:280px;object-fit:cover;display:block;background:var(--s3)}
.cprev-ph{width:100%;height:80px;background:var(--s3);display:flex;align-items:center;justify-content:center}
.cprev-body{padding:16px 20px}
.cprev-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.cprev-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--t);flex:1;line-height:1.2}
.cprev-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;align-items:center}
.cprev-notes{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:10px;white-space:pre-wrap}
.cprev-section{margin-bottom:12px}
.cprev-slbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:6px}
.cprev-imgs{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.cprev-imgs img{width:100px;height:80px;object-fit:cover;border-radius:var(--rs);border:1px solid var(--b);cursor:pointer}
.cprev-foot{padding:12px 20px;border-top:1px solid var(--b);display:flex;justify-content:flex-end}
.ibtn{width:25px;height:25px;border-radius:var(--rs);background:var(--s2);border:1px solid var(--b);color:var(--t2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ibtn:hover{background:var(--s3);color:var(--t)}
.cat-icon-circle{width:32px;height:32px;border-radius:50%;background:#f5f3ee;border:1.5px solid #4a4540;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* PDF inline in detail */
.pdf-inline{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.pdf-inline canvas{border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.12);max-width:100%;display:block}
.pdf-loading{font-size:11px;color:var(--t3);padding:8px 0}

/* Image lightbox */
.lbox-ov{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:3000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lbox-ov.open{opacity:1;pointer-events:all}
.lbox-img{max-width:90vw;max-height:90vh;border-radius:var(--r);object-fit:contain}
.lbox-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.lbox-close:hover{background:rgba(255,255,255,.3)}

/* ── PRINT STYLES ── */
@media print {
  header, .tabs, .filter-row, .map-search-bar, #mapSearchResults, #map-panel,
  .cprev-ov, .lbox-ov, .rc-ft, .ibtn, .no-print { display: none !important; }

  body { background: #fff; font-size: 11pt; }
  .panel { display: block !important; page-break-after: always; }
  #res-panel { page-break-after: always; }
  #itin-panel { page-break-after: always; }

  /* Print header */
  .print-header { display: block !important; }

  /* Itinerary: vertical list instead of horizontal scroll */
  .itin-scroll {
    display: block !important;
    overflow: visible !important;
    padding: 0 !important;
  }
  .dcol {
    width: 100% !important;
    max-height: none !important;
    page-break-inside: avoid;
    margin-bottom: 16pt;
    break-inside: avoid;
  }
  .dcol-scroll { overflow: visible !important; }

  /* Research: 2-col grid */
  .res-body {
    grid-template-columns: repeat(2, 1fr) !important;
    overflow: visible !important;
  }
  .rc { height: auto !important; page-break-inside: avoid; break-inside: avoid; }
  .rc-img-wrap { height: 120px !important; }

  /* Show PDFs inline when printing */
  .pdf-inline { display: flex !important; }
  .pdf-inline canvas { max-width: 100% !important; page-break-inside: avoid; break-inside: avoid; }

  /* Day columns side by side on print, 3 per row */
  @page { margin: 15mm; }
}

/* Print header hidden on screen */
.print-header { display: none; padding: 0 0 16px; }
.print-header h1 { font-family: 'Playfair Display', serif; font-size: 24pt; color: var(--acc); }
.print-header p { font-size: 10pt; color: #666; margin-top: 4px; }

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--t);border-radius:var(--r);padding:9px 18px;font-size:12px;color:#fff;z-index:9999;transition:transform .25s,opacity .25s;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <div class="logo">triply</div>
    <span class="badge">View only</span>
  </div>
  <div class="hdr-r">
    <span id="tripNameHdr" style="font-size:13px;font-weight:500;color:var(--t2)"></span>
    <button class="btn btn-g no-print" onclick="window.print()">🖨 Print</button>
  </div>
</header>

<div class="tabs no-print">
  <button class="tab on" onclick="showTab('itin')">🗓 Itinerary</button>
  <button class="tab" onclick="showTab('res')">🔍 Research</button>
  <button class="tab" onclick="showTab('map')">🗺 Map</button>
</div>

<!-- PRINT HEADER (shown only when printing) -->
<div class="print-header" id="printHeader">
  <h1 id="printTripName"></h1>
  <p id="printTripDates"></p>
</div>

<!-- ITINERARY PANEL -->
<div class="panel on" id="itin-panel">
  <div class="itin-scroll" id="itin-body"></div>
</div>

<!-- RESEARCH PANEL -->
<div class="panel" id="res-panel">
  <div class="filter-row" id="filterRow"></div>
  <div class="res-body" id="res-body"></div>
</div>

<!-- MAP PANEL -->
<div class="panel" id="map-panel">
  <div class="map-search-bar">
    <input class="map-search-input" id="mapSearchInput" placeholder="Search location…" onkeydown="if(event.key==='Enter')searchMapLocation()">
    <button class="map-search-btn" onclick="searchMapLocation()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </button>
  </div>
  <div id="mapSearchResults"></div>
  <div id="map"></div>
</div>

<!-- CARD DETAIL -->
<div class="cprev-ov" id="cprevOv" onclick="if(event.target===this)closeCprev()">
  <div class="cprev-modal" id="cprevModal"></div>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="lbox-ov" id="lboxOv" onclick="closeLbox()">
  <button class="lbox-close" onclick="closeLbox()">✕</button>
  <img class="lbox-img" id="lboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── ICONS (same as main app) ──────────────────────────
const ICONS = {
  tent:`<path d="M3 20L12 4l9 16H3z"/><path d="M12 4v16M8 20l4-8 4 8"/>`,
  boot:`<path d="M3 18h14a2 2 0 000-4h-2l-2-6H7L5 14H3a1 1 0 000 2v2z"/>`,

  fork:`<path d="M12 2v20M8 2v6a4 4 0 004 4 4 4 0 004-4V2"/>`,
  camera:`<rect x="2" y="7" width="20" height="14" rx="2"/><circle cx="12" cy="14" r="3"/><path d="M16 7l-1.5-2h-5L8 7"/>`,
  swim:`<path d="M2 14c2-2 4-2 6 0s4 2 6 0 4-2 6 0M2 18c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/><circle cx="12" cy="8" r="3"/>`,
  bike:`<circle cx="6" cy="16" r="3"/><circle cx="18" cy="16" r="3"/><path d="M6 16l4-8h4l2 4M10 8l2 8M14 12h4"/>`,
  deer:`<path d="M12 2c0 2-2 4-2 6h4c0-2-2-4-2-6zM8 8l-2-4M16 8l2-4M10 14H8l-2 6h12l-2-6h-2M10 14v-2M14 14v-2M10 12c0-1 4-1 4 0"/>`,
  mountain:`<path d="M2 20L8 8l4 6 2-3 6 9H2z"/>`,
  wave:`<path d="M2 6c2-3 4-3 6 0s4 3 6 0 4-3 6 0M2 12c2-3 4-3 6 0s4 3 6 0 4-3 6 0M2 18c2-3 4-3 6 0s4 3 6 0 4-3 6 0"/>`,
  fish:`<path d="M6 12C6 8 10 4 18 4l-2 8 2 8C10 20 6 16 6 12z"/><path d="M18 4l2-2M18 20l2 2"/><circle cx="10" cy="12" r="1"/>`,
  ski:`<circle cx="12" cy="5" r="2"/><path d="M5 20l5-8 3 2 4-6M3 20h18"/>`,
  surf:`<path d="M2 18C6 14 10 12 20 6l-4 12H2z"/><path d="M20 6l2-4"/>`,
  compass:`<circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-4.95 4.95-2.83 2.83 4.95-4.95 2.83-2.83z"/><path d="M7.76 16.24l2.83-2.83"/>`,
  map:`<path d="M1 6l7-3 8 4 7-3v15l-7 3-8-4-7 3V6z"/><path d="M8 3v15M16 7v15"/>`,
  tree:`<path d="M12 2L4 12h4l-3 5h7v5h2v-5h7l-3-5h4L12 2z"/>`,

function iconCircleHtml(key,color='#4a4540',size=28,customImg=''){
  const inner=customImg
    ?`<img src="${customImg}" style="width:${Math.round(size*.65)}px;height:${Math.round(size*.65)}px;border-radius:50%;object-fit:cover;">`
    :svgIcon(key,Math.round(size*.52),color);

}

// ── BOOT ─────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const tripId  = params.get('trip');
const sbUrl   = params.get('sb');
const sbKey   = params.get('key');
const gmKey   = params.get('gm');

document.addEventListener('DOMContentLoaded', async ()=>{
  if(!tripId||!sbUrl||!sbKey){
    showError('Invalid share link — ask the trip owner to reshare.');
    return;
  }
  showLoading('Loading trip…');
  try{
    const res = await fetch(`${sbUrl}/rest/v1/trips?id=eq.${encodeURIComponent(tripId)}&select=data`,{
      headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey}
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows = await res.json();
    if(!rows||!rows.length) throw new Error('Trip not found');
    trip = rows[0].data;
    if(!trip.cats) trip.cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
    hideLoading();
    renderAll();
    if(gmKey) loadGoogleMaps();
  }catch(e){
    console.error(e);
    showError('Could not load trip. The link may have expired or the trip may not exist.');
  }
});

function showLoading(msg){
  document.body.innerHTML += `<div class="status-screen" id="statusScreen"><div class="spinner"></div><div>${msg}</div></div>`;
}
function hideLoading(){
  const s=document.getElementById('statusScreen');if(s)s.remove();
}
function showError(msg){
  hideLoading();
  const s=document.getElementById('statusScreen')||document.createElement('div');
  s.id='statusScreen';s.className='status-screen';
  s.innerHTML=`<div style="font-size:32px">⚠️</div><div style="color:var(--no);text-align:center;max-width:320px">${msg}</div>`;
  document.body.appendChild(s);
}

function renderItinerary(){
  const body = document.getElementById('itin-body');
  const days = trip.days||[];
  if(!days.length){
    body.innerHTML=`<div style="padding:40px;color:var(--t3);font-size:13px">No days planned yet.</div>`;
    return;
  }
  body.innerHTML = days.map(d=>dayColHtml(d)).join('');

    el.addEventListener('click',()=>openCprev(el.dataset.id));
  });

function dayColHtml(day){
  if(!day.sections) day.sections={};
  const flights=(trip.flights||[]).filter(f=>f.dayId===day.id);
  const flightHtml=flights.map(f=>flightCardHtml(f)).join('');
  const secHtml=SECTIONS.map(sec=>{
    const sd=day.sections[sec.id]||{cards:[],note:''};
    const items=(sd.cards||[]).map(cid=>{
      const c=(trip.cards||[]).find(x=>x.id===cid);if(!c)return'';
      const ct=getcat(c.catId);
      const imgH=c.imgUrl
        ?`<img class="ic-img" src="${xe(c.imgUrl)}" onerror="this.style.display='none'" alt="">`
        :`<div class="ic-ph">${iconCircleHtml(ct.icon||'pin',ct.color,22,ct.customImg||'')}</div>`;
      return `<div class="ic" data-id="${c.id}" data-s="${c.status}">
        ${imgH}
        <div class="ic-body">
          <div class="ic-nm">${xe(c.name)||'Unnamed'}</div>
          <div class="ic-sub">${svgIcon(ct.icon||'pin',10,ct.color)}${c.cost?`<span style="color:var(--acc)">${xe(c.cost)}</span>`:''}${c.startTime?`<span>🕐 ${xe(c.startTime)}</span>`:''}</div>
        </div>
      </div>`;
    }).join('');
    const noteHtml=sd.note?`<div class="dsec-note">${xe(sd.note)}</div>`:'';
    if(!items&&!sd.note) return '';
    return `<div class="dsec">
      <div class="dsec-h">${svgIcon(sec.icon,10,'#9e9080')} ${sec.label}</div>
      ${items}${noteHtml}
    </div>`;
  }).filter(Boolean).join('');

  return `<div class="dcol">
    <div class="dcol-h">
      <span class="d-title">${xe(day.label)}</span>
      ${day.date?`<span class="d-date-lbl">${xe(day.date)}</span>`:''}
    </div>
    <div class="dcol-scroll">${flightHtml}${secHtml||'<div style="padding:8px;font-size:11px;color:var(--t3)">Nothing planned yet</div>'}</div>
  </div>`;
}

function flightCardHtml(f){
  const dep=f.depTime||'--:--', arr=f.arrTime||'--:--';
  let depM=0,arrM=0,durStr='';
  if(f.depTime&&f.arrTime){
    depM=parseInt(f.depTime)*60+parseInt(f.depTime.split(':')[1]||0);
    arrM=parseInt(f.arrTime)*60+parseInt(f.arrTime.split(':')[1]||0);
    const diff=(arrM-depM+1440)%1440;
    durStr=`${Math.floor(diff/60)}h ${diff%60}m`;
  }
  return `<div class="fc">
    <div class="fc-head">
      <div><div class="fc-airline">${xe(f.airline||'')}</div><div class="fc-num">${xe(f.flightNum)}</div></div>
      <div class="fc-status">${xe(f.status||'Scheduled')}</div>
    </div>
    <div class="fc-route">
      <div class="fc-airport"><div class="fc-iata">${xe(f.from)}</div><div class="fc-time">${xe(dep)}</div><div class="fc-city">${xe(f.fromCity||'')}</div></div>
      <div class="fc-arrow"><div class="fc-arrow-line"></div><div class="fc-duration">${durStr}</div></div>
      <div class="fc-airport"><div class="fc-iata">${xe(f.to)}</div><div class="fc-time">${xe(arr)}</div><div class="fc-city">${xe(f.toCity||'')}</div></div>
    </div>
  </div>`;
}

function renderResearch(){
  renderFilterRow();
  const cards=(trip.cards||[]).filter(c=>{
    const stOk=filterStatus.size===0||filterStatus.has(c.status);
    const catOk=filterCats.size===0||filterCats.has(c.catId);
    return stOk&&catOk;
  });
  const body=document.getElementById('res-body');
  if(!cards.length){
    body.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--t3);font-size:13px">${(trip.cards||[]).length?'No cards match filters':'No places added yet.'}</div>`;
    return;
  }
  body.innerHTML=cards.map(c=>cardHtml(c)).join('');
  body.querySelectorAll('.rc').forEach(el=>{
    el.addEventListener('click',()=>openCprev(el.dataset.id));
  });
}

function renderFilterRow(){
  const cats=trip.cats||DEFAULT_CATS;
  const statuses=[
    {id:'yes',label:'✓ Yes',color:'var(--yes)'},
    {id:'maybe',label:'? Maybe',color:'var(--maybe)'},
    {id:'no',label:'✕ No',color:'var(--no)'},
  ];
  const stChips=statuses.map(s=>`<button class="chip${filterStatus.has(s.id)?' on':''}" onclick="toggleSt('${s.id}')">${s.label}</button>`).join('');
  const catChips=cats.map(c=>`<button class="chip${filterCats.has(c.id)?' on':''}" onclick="toggleCat('${c.id}')"><span class="chip-dot" style="background:${c.color}"></span>${xe(c.name)}</button>`).join('');
  document.getElementById('filterRow').innerHTML=stChips+'<span class="filter-sep"></span>'+catChips;
}

function toggleSt(s){filterStatus.has(s)?filterStatus.delete(s):filterStatus.add(s);renderResearch();}
function toggleCat(c){filterCats.has(c)?filterCats.delete(c):filterCats.add(c);renderResearch();}

async function renderPdfInline(att, containerId){
  const container = document.getElementById(containerId);
  if(!container) return;
  const src = att.url || att.dataUrl || '';
  if(!src){ container.innerHTML='<div class="pdf-loading">No PDF data.</div>'; return; }
  try{
    const pdf = await pdfjsLib.getDocument(src).promise;
    container.innerHTML='';
    for(let p=1;p<=pdf.numPages;p++){
      const page = await pdf.getPage(p);
      const vp = page.getViewport({scale:1});
      const scale = Math.min(500, container.parentElement?.clientWidth||500) / vp.width;
      const scaled = page.getViewport({scale});
      const canvas = document.createElement('canvas');
      const dpr = window.devicePixelRatio||1;
      canvas.width  = scaled.width*dpr;
      canvas.height = scaled.height*dpr;
      canvas.style.width  = scaled.width+'px';
      canvas.style.height = scaled.height+'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr,dpr);
      await page.render({canvasContext:ctx,viewport:scaled}).promise;
      container.appendChild(canvas);
    }
  }catch(e){
    container.innerHTML=`<div class="pdf-loading" style="color:var(--no)">Could not render PDF.</div>`;
    console.error('PDF render error:',e);
  }
}

function loadGoogleMaps(){
  const s=document.createElement('script');
  s.src=`https://maps.googleapis.com/maps/api/js?key=${gmKey}&libraries=places&callback=initMap`;
  s.async=true;
  document.head.appendChild(s);
}

window.initMap=function(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:54,lng:-3},zoom:5,mapTypeId:'roadmap',styles:CREAM_STYLE,
    mapTypeControl:false,streetViewControl:false,fullscreenControl:false,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM}
  });
  if(window.ResizeObserver) new ResizeObserver(()=>{if(map)google.maps.event.trigger(map,'resize');}).observe(document.getElementById('map'));
  refreshMap();
};

function refreshMap(){
  if(!map||!window.google)return;
  mapMarkers.forEach(m=>m.setMap(null));mapMarkers=[];
  (trip.cards||[]).forEach(card=>{
    if(!card.lat||!card.lng)return;
    const c=getcat(card.catId),color=c.color||'#8b6914';
    const iconPaths=ICONS[c.icon||'pin']||ICONS.pin;
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" fill="#f5f3ee" stroke="${color}" stroke-width="2"/><g transform="translate(10,10) scale(0.667)" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${iconPaths}</g></svg>`;
    const icon={url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(36,36),anchor:new google.maps.Point(18,18)};
    const marker=new google.maps.Marker({position:{lat:parseFloat(card.lat),lng:parseFloat(card.lng)},map,icon,title:card.name});
    const iw=new google.maps.InfoWindow({maxWidth:240,content:`<div style="font-family:'Jost',sans-serif">
      ${card.imgUrl?`<img src="${xe(card.imgUrl)}" style="width:100%;height:70px;object-fit:cover;border-radius:5px;margin-bottom:6px;display:block" onerror="this.style.display='none'">`:''}
      <div style="font-weight:600;font-size:13px;margin-bottom:3px">${xe(card.name)}</div>
      ${card.cost?`<div style="font-size:11px;color:#8b6914;font-weight:600">${xe(card.cost)}</div>`:''}
      ${card.address?`<div style="font-size:10px;color:#9e9080;margin-top:2px">📍 ${xe(card.address)}</div>`:''}
    </div>`});
    marker.addListener('click',()=>{iw.open(map,marker);});
    mapMarkers.push(marker);
  });
  // Fit map to pins
  if(mapMarkers.length){
    const bounds=new google.maps.LatLngBounds();
    mapMarkers.forEach(m=>bounds.extend(m.getPosition()));
    map.fitBounds(bounds);
  }
}

function zoomToCard(cardId){
  showTab('map');
  const card=(trip.cards||[]).find(c=>c.id===cardId);
  if(!card||!map||!window.google)return;
  setTimeout(()=>{
    map.panTo({lat:parseFloat(card.lat),lng:parseFloat(card.lng)});
    map.setZoom(14);
    google.maps.event.trigger(map,'resize');
  },200);
}

function searchMapLocation(){
  if(!map||!window.google)return;
  const q=document.getElementById('mapSearchInput').value.trim();
  if(!q)return;
  new google.maps.Geocoder().geocode({address:q},(results,status)=>{
    if(status==='OK'&&results[0]){
      const loc=results[0].geometry.location;
      map.panTo(loc);map.setZoom(13);
      if(searchMarker)searchMarker.setMap(null);
      searchMarker=new google.maps.Marker({position:loc,map,title:results[0].formatted_address});
      document.getElementById('mapSearchResults').innerHTML='';
    }
  });
}

// ── PRINT ─────────────────────────────────────────────
// Before printing, ensure all PDF attachments in all cards are rendered invisibly
// so they appear in the print output. We pre-render them into a hidden div.
window.addEventListener('beforeprint', async ()=>{
  // Make all panels visible for printing
  document.querySelectorAll('.panel').forEach(p=>p.classList.add('on'));
});
window.addEventListener('afterprint', ()=>{
  // Restore single-panel view
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  showTab('itin');
});
</script>
